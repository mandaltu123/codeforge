services:
  codeforge-api:
    build: .
    container_name: codeforge-api
    # Run as root so the container can access the Docker socket for sandboxing
    user: "0:0"
    ports:
      - "8000:8000"
    volumes:
      # Allow API container to control Docker
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock
      # Share a host temp dir so nested Docker can mount files
      - /tmp/llmexec:/tmp/llmexec
    environment:
      - ENV=production
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:latest}
      - OLLAMA_TIMEOUT=${OLLAMA_TIMEOUT:-30}
      - OLLAMA_RETRIES=${OLLAMA_RETRIES:-5}
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  ollama:
